<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FunSpace</title>
    <script>
      var lang = (navigator.language || "en").toLowerCase();
      var target = lang.startsWith("it") ? "./it/" : "./en/";
      location.replace(target);
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=./en/" />
    </noscript>
  </head>
  <body>
    <p>Redirecting… <a href="./en/">English</a> · <a href="./it/">Italiano</a></p>
  </body>
</html>
